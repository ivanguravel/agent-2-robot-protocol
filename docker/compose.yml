x-basic: &basic
  ipc: host
  stdin_open: true
  tty: true
  privileged: true
  environment:
    DISPLAY: host.docker.internal:0
    XAUTHORITY: "/root/.Xauthority"
    QT_X11_NO_MITSHM: "1"
    XDG_RUNTIME_DIR:
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - $HOME/.Xauthority:/root/.Xauthority

x-server: &server
  ipc: host
  stdin_open: true
  tty: true
  privileged: true


x-gui_env: &env_gui
  DISPLAY: host.docker.internal:0
  XAUTHORITY: "/root/.Xauthority"
  QT_X11_NO_MITSHM: "1"
  XDG_RUNTIME_DIR:

x-gpu: &nvidia
  <<: *basic
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities:
              - gpu
              - graphics
              - utility # nvidia-smi
              - compute # CUDA. Required to avoid "CUDA version: N/A"
              - video # NVDEC/NVENC

services:

  # Headless mode (no GUI) — use when you don't need visualization
  simulator-headless:
    <<: *basic
    image: go2_simulator
    container_name: simulator
    command: bash -c "source install/setup.bash && ros2 launch gazebo_sim launch.py use_sim_time:=true enable_rviz:=false"
    environment:
      <<: *env_gui
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      GZ_SIM_RESOURCE_PATH: "/root/ws/src/gazebo_sim/models/"
      CYCLONEDDS_URI: file:///cyclonedds.xml
      ROS_DOMAIN_ID: 0
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: jazzy
        BASE_IMG: ros:jazzy
    volumes:
      - ./cyclonedds.xml:/cyclonedds.xml
      - ./../:/root/ws/src/

  # GUI mode via noVNC — open http://localhost:8080/vnc.html in browser
  simulator:
    image: go2_simulator
    container_name: simulator-gui
    stdin_open: true
    tty: true
    command: /usr/bin/supervisord -c /root/supervisord.conf
    ports:
      - "8080:8080"
      - "5900:5900"
    environment:
      DISPLAY: ":1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      QT_X11_NO_MITSHM: "1"
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      GZ_SIM_RESOURCE_PATH: "/root/ws/src/gazebo_sim/models/"
      CYCLONEDDS_URI: file:///cyclonedds.xml
      ROS_DOMAIN_ID: 0
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: jazzy
        BASE_IMG: ros:jazzy
    volumes:
      - ./cyclonedds.xml:/cyclonedds.xml
      - ./supervisord.conf:/root/supervisord.conf
      - ./../:/root/ws/src/

  # Speech-to-text server (faster-whisper, OpenAI-compatible API)
  whisper:
    image: hwdsl2/whisper-server
    container_name: whisper
    ports:
      - "9000:9000"
    environment:
      - WHISPER_MODEL=small
      - WHISPER_LANGUAGE=ru
      - WHISPER_API_KEY=
    volumes:
      - whisper-data:/var/lib/whisper
    restart: unless-stopped

volumes:
  whisper-data: